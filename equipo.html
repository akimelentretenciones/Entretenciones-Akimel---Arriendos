<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AKIMEL — Equipo</title>
<meta name="theme-color" content="#041e42">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f8;--bg2:#fff;--bg3:#e8f0f7;--bg4:#ddeaf6;
  --blue:#0071ce;--blue2:#005fa3;--blue3:#041e42;
  --green:#5fb446;--yellow:#ffc220;--orange:#fa6400;--red:#de1c24;
  --text:#041e42;--text2:#3a5068;--text3:#7a93aa;
  --border:rgba(0,113,206,.12);--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;-webkit-text-size-adjust:100%}
input,select,textarea,button{font-size:16px;font-family:'Sora',sans-serif}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--blue3)}
.login-box{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo img{width:110px;height:110px;object-fit:contain;border-radius:16px;margin-bottom:10px;display:block;margin-left:auto;margin-right:auto}
.login-title{font-size:20px;font-weight:800;color:var(--blue3)}
.login-sub{font-size:13px;color:var(--text3);margin-top:4px}
.fg{margin-bottom:16px}
.fl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:block;font-weight:700}
.fi{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:13px 14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.fi:focus{border-color:var(--blue)}
.btn-primary{width:100%;padding:14px;border:none;border-radius:var(--radius);font-family:'Sora',sans-serif;font-weight:700;font-size:15px;cursor:pointer;background:var(--blue);color:#fff;transition:opacity .2s;margin-top:4px}
.btn-primary:active{opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.login-err{background:rgba(222,28,36,.08);border:1px solid rgba(222,28,36,.25);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.login-footer{margin-top:16px;font-size:11px;color:rgba(255,255,255,.4);text-align:center}

/* APP */
.app{display:none;flex-direction:column;min-height:100vh}
.app.active{display:flex}

/* Header */
.hdr{background:var(--blue3);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{width:34px;height:34px;border-radius:8px;overflow:hidden;flex-shrink:0}
.hdr-logo img{width:100%;height:100%;object-fit:cover}
.hdr-name{font-weight:800;font-size:15px;color:#fff}
.hdr-fecha{font-size:10px;color:rgba(255,255,255,.55);margin-top:1px}
.btn-logout{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:rgba(255,255,255,.8);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer}

/* Main */
.main{flex:1;padding:16px;padding-bottom:48px;max-width:1400px;margin:0 auto;width:100%}

/* Worker badge */
.worker-badge{background:linear-gradient(135deg,var(--blue),var(--blue3));border-radius:var(--radius);padding:16px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)}
.worker-avatar{width:44px;height:44px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0;border:2px solid rgba(255,255,255,.3)}
.worker-info-name{font-weight:800;font-size:17px;color:#fff}
.worker-info-sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:2px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.stat{background:#fff;border-radius:var(--radius);padding:12px;text-align:center;box-shadow:var(--shadow);border-left:3px solid var(--blue)}
.stat-v{font-weight:800;font-size:22px;color:var(--blue)}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* Tabla */
.table-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow);background:#fff}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--bg3)}
th{padding:10px 12px;text-align:left;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.8px;font-weight:700;white-space:nowrap;border-bottom:2px solid var(--border)}
td{padding:10px 12px;border-top:1px solid var(--border);color:var(--text2);vertical-align:middle}
tr:hover td{background:var(--bg3)}
.equipos-cell{display:flex;flex-wrap:wrap;gap:3px;min-width:130px}
.equipo-tag{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:2px 7px;font-size:10px;color:var(--text2);font-weight:600;white-space:nowrap}

/* Badge */
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}
.badge-pend{background:rgba(0,113,206,.1);color:var(--blue)}
.badge-ok{background:rgba(95,180,70,.12);color:var(--green)}
.badge-canc{background:rgba(222,28,36,.1);color:var(--red)}

/* Pago inline */
.pago-row{display:flex;gap:4px}
.pago-btn{padding:5px 9px;border-radius:6px;border:1.5px solid var(--border);background:#fff;color:var(--text3);font-family:'Sora',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;line-height:1}
.pago-btn.sel-transfer{background:rgba(0,113,206,.1);border-color:var(--blue)}
.pago-btn.sel-efectivo{background:rgba(95,180,70,.1);border-color:var(--green)}

/* Retiro inline */
.retiro-cell{display:flex;gap:4px;align-items:center;min-width:170px}
.fi-hora{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:6px;color:var(--text);padding:5px 8px;outline:none;font-size:11px;font-family:'Sora',sans-serif}
.fi-hora:focus{border-color:var(--blue)}
.btn-retiro{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-family:'Sora',sans-serif;font-weight:700;font-size:12px;cursor:pointer}

/* Chip guardado */
.saved-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(95,180,70,.12);border:1px solid rgba(95,180,70,.3);color:var(--green);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;margin-top:4px}

/* Empty / Loading */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-txt{font-size:14px;line-height:1.6}
.loading{text-align:center;padding:48px 20px;color:var(--text3)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--blue3);color:#fff;border-radius:30px;padding:11px 22px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;white-space:nowrap;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <img src="Logo.jpeg" alt="Akimel">
      <div class="login-title">AKIMEL</div>
      <div class="login-sub">Acceso para el equipo</div>
    </div>
    <div class="login-err" id="loginErr"></div>
    <div class="fg">
      <label class="fl">Correo</label>
      <input type="email" class="fi" id="loginEmail" placeholder="nombre@akimel.cl" autocomplete="email">
    </div>
    <div class="fg">
      <label class="fl">Contraseña</label>
      <input type="password" class="fi" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="btnLogin" onclick="window.doLogin()">Ingresar</button>
  </div>
  <div class="login-footer">Entretenciones AKIMEL © 2026</div>
</div>

<!-- APP -->
<div class="app" id="appWrap">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-logo"><img src="Logo.jpeg" alt="Akimel"></div>
      <div>
        <div class="hdr-name" id="hdrName">Cargando...</div>
        <div class="hdr-fecha" id="hdrFecha"></div>
      </div>
    </div>
    <button class="btn-logout" onclick="window.doLogout()">🚪 Salir</button>
  </div>
  <div class="main" id="mainContent">
    <div class="loading"><div class="spinner"></div><div>Cargando arriendos...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyCwqFq4B3YOAT5q5LiKHCSYNQhQphviQHE",
  authDomain:"base-de-datos-akimel-arriendos.firebaseapp.com",
  projectId:"base-de-datos-akimel-arriendos",
  storageBucket:"base-de-datos-akimel-arriendos.firebasestorage.app",
  messagingSenderId:"515460008647",
  appId:"1:515460008647:web:6c6b72c53c31312b12cce2"
});
const db = getFirestore(app);
const auth = getAuth(app);

const TRABAJADORES = {
  'cristobal':'Cristóbal',
  'leo':'Leo',
  'cristofer':'Cristófer',
  'martin':'Martín'
};
const EMAIL_NOMBRE = {
  'cristobal@akimel.cl':'cristobal',
  'leo@akimel.cl':'leo',
  'cristofer@akimel.cl':'cristofer',
  'martin@akimel.cl':'martin'
};

let currentWorkerKey = null;
let unsubArriendos = null;

function todayISO() {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
}
function todayLong() {
  return new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});
}
function clp(n) {
  return n ? '$' + parseInt(n).toLocaleString('es-CL') : '—';
}
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(function(){ t.className = 'toast'; }, 2800);
}

// ── Login ──
window.doLogin = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('loginErr');
  const btn   = document.getElementById('btnLogin');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Ingresando...';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    err.textContent = '⚠️ Correo o contraseña incorrectos';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Ingresar';
  }
};

document.getElementById('loginPass').addEventListener('keydown', function(e) {
  if(e.key === 'Enter') window.doLogin();
});

window.doLogout = async function() {
  if(unsubArriendos) unsubArriendos();
  await signOut(auth);
};

// ── Auth state ──
onAuthStateChanged(auth, function(user) {
  if(user) {
    const emailLower = user.email.toLowerCase();
    currentWorkerKey = EMAIL_NOMBRE[emailLower] || emailLower.split('@')[0];
    const nombre = TRABAJADORES[currentWorkerKey] || currentWorkerKey;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('appWrap').classList.add('active');
    document.getElementById('hdrName').textContent = nombre;
    document.getElementById('hdrFecha').textContent = todayLong();
    cargarArriendos(currentWorkerKey, nombre);
  } else {
    if(unsubArriendos) { unsubArriendos(); unsubArriendos = null; }
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('appWrap').classList.remove('active');
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('btnLogin').disabled = false;
    document.getElementById('btnLogin').textContent = 'Ingresar';
  }
});

// ── Cargar arriendos ──
function cargarArriendos(workerKey, nombre) {
  const hoy = todayISO();
  if(unsubArriendos) unsubArriendos();
  unsubArriendos = onSnapshot(collection(db, 'arriendos'), function(snap) {
    const todos = [];
    snap.forEach(function(d) { todos.push(Object.assign({id: d.id}, d.data())); });

    // DEBUG — ver en consola qué llega
    const asignados = todos.filter(function(a) {
      return (a.trabajadorAsignado || '').toLowerCase() === workerKey.toLowerCase();
    });
    console.log('workerKey:', workerKey, '| hoy:', hoy, '| total:', todos.length, '| asignados a mi:', asignados.length);
    asignados.forEach(function(a) { console.log('  fecha:', JSON.stringify(a.fecha), '| cliente:', a.cliente); });

    const misTareas = asignados.filter(function(a) {
      return a.fecha === hoy && a.estado !== 'Cancelado';
    });
    renderApp(misTareas, nombre);
  }, function(err) {
    console.error('Error:', err);
    document.getElementById('mainContent').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-txt">Error al cargar datos.<br>Verifica tu conexión.</div></div>';
  });
}

// ── Render ──
function renderApp(arriendos, nombre) {
  const main = document.getElementById('mainContent');
  const total = arriendos.length;
  const conPago = arriendos.filter(function(a){ return a.medioPago_equipo; }).length;
  const conRetiro = arriendos.filter(function(a){ return a.horaRetiro; }).length;

  let html = '<div class="worker-badge">'
    + '<div class="worker-avatar">' + nombre.charAt(0) + '</div>'
    + '<div><div class="worker-info-name">Hola, ' + nombre + ' 👋</div>'
    + '<div class="worker-info-sub">Tus arriendos de hoy &middot; ' + todayISO() + '</div></div>'
    + '</div>'
    + '<div class="stats">'
    + '<div class="stat"><div class="stat-v">' + total + '</div><div class="stat-l">Arriendos</div></div>'
    + '<div class="stat"><div class="stat-v">' + conPago + '</div><div class="stat-l">Con pago</div></div>'
    + '<div class="stat"><div class="stat-v">' + conRetiro + '</div><div class="stat-l">Retiro ok</div></div>'
    + '</div>';

  if(total === 0) {
    html += '<div class="empty"><div class="empty-icon">📭</div>'
      + '<div class="empty-txt">No tienes arriendos asignados para hoy.<br>Consulta con el administrador.</div></div>';
  } else {
    html += '<div class="table-wrap"><table><thead><tr>'
      + '<th>#</th><th>Cliente</th><th>Dirección</th><th>Hora</th>'
      + '<th>Teléfono</th><th>Equipos</th><th>Monto</th><th>Estado</th>'
      + '<th>💳 Pago</th><th>🚚 Retiro</th>'
      + '</tr></thead><tbody>';

    for(let i = 0; i < arriendos.length; i++) {
      const a = arriendos[i];
      const id = a.id;
      const bc = a.estado === 'Pagado' ? 'badge-ok' : a.estado === 'Cancelado' ? 'badge-canc' : 'badge-pend';
      const pg = a.medioPago_equipo || '';
      const hr = a.horaRetiro || '';
      const etags = (a.equipos || '').split(',')
        .map(function(e){ return e.trim(); })
        .filter(function(e){ return e.length > 0; })
        .map(function(e){ return '<div class="equipo-tag">' + e + '</div>'; })
        .join('');
      const telLink = a.telefono
        ? '<a href="tel:' + a.telefono + '" style="color:var(--blue);font-weight:700;text-decoration:none">' + a.telefono + '</a>'
        : '—';
      const comunaSub = a.comuna
        ? '<br><span style="color:var(--text3);font-size:11px">' + a.comuna + '</span>'
        : '';
      const savedPago = pg
        ? '<div class="saved-chip">✓ ' + (pg === 'transferencia' ? 'Transf.' : 'Efectivo') + '</div>'
        : '';
      const savedRetiro = hr
        ? '<div class="saved-chip">✓ ' + hr + '</div>'
        : '';

      html += '<tr>'
        + '<td style="color:var(--text3)">' + (i+1) + '</td>'
        + '<td style="font-weight:700;color:var(--blue3)">' + (a.cliente || '—') + '</td>'
        + '<td style="font-size:12px">' + (a.direccion || '—') + comunaSub + '</td>'
        + '<td style="font-weight:600">' + (a.hora || '—') + '</td>'
        + '<td>' + telLink + '</td>'
        + '<td><div class="equipos-cell">' + (etags || '—') + '</div></td>'
        + '<td style="font-family:monospace;font-weight:700;color:var(--blue)">' + clp(a.pendiente) + '</td>'
        + '<td><span class="badge ' + bc + '">' + (a.estado || 'Pendiente') + '</span></td>'
        + '<td>'
        +   '<div class="pago-row">'
        +     '<button class="pago-btn ' + (pg === 'transferencia' ? 'sel-transfer' : '') + '" onclick="window.registrarPago(' + JSON.stringify(id) + ',\'transferencia\')">🏦</button>'
        +     '<button class="pago-btn ' + (pg === 'efectivo' ? 'sel-efectivo' : '') + '" onclick="window.registrarPago(' + JSON.stringify(id) + ',\'efectivo\')">💵</button>'
        +   '</div>' + savedPago
        + '</td>'
        + '<td>'
        +   '<div class="retiro-cell">'
        +     '<input type="text" class="fi-hora" id="retiro-' + id + '" value="' + hr + '" placeholder="ej: 22:00 a 22:30">'
        +     '<button class="btn-retiro" onclick="window.registrarRetiro(' + JSON.stringify(id) + ')">✓</button>'
        +   '</div>' + savedRetiro
        + '</td>'
        + '</tr>';
    }
    html += '</tbody></table></div>';
  }

  main.innerHTML = html;
}

// ── Acciones ──
window.registrarPago = async function(id, tipo) {
  try {
    await updateDoc(doc(db, 'arriendos', id), { medioPago_equipo: tipo });
    showToast('✓ ' + (tipo === 'transferencia' ? 'Transferencia' : 'Efectivo') + ' registrado', 'ok');
  } catch(e) {
    showToast('Error al guardar', 'err');
    console.error(e);
  }
};

window.registrarRetiro = async function(id) {
  const input = document.getElementById('retiro-' + id);
  if(!input || !input.value.trim()) {
    showToast('Ingresa el horario de retiro', 'err');
    return;
  }
  try {
    await updateDoc(doc(db, 'arriendos', id), { horaRetiro: input.value.trim() });
    showToast('✓ Retiro ' + input.value + ' guardado', 'ok');
  } catch(e) {
    showToast('Error al guardar', 'err');
    console.error(e);
  }
};
</script>
</body>
</html>
